title: Medical Radiations Research Group
description: >-
  RMIT University Medical Radiations Research Group — part of the Accelerator
  for Translational Research and Clinical Trials (ATRACT).
url: "https://rmit-medical-radiations.github.io"
baseurl: ""

atract_url: "https://www.rmit.edu.au/about/schools-colleges/stem-college/research/leading-research-centres/atract-centre"

collections:
  people:
    output: true
    permalink: /people/:slug/
  projects:
    output: true
    permalink: /projects/:slug/

defaults:
  - scope:
      path: ""
      type: people
    values:
      layout: person
  - scope:
      path: ""
      type: projects
    values:
      layout: project

markdown: kramdown
permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
